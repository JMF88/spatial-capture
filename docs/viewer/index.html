<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Spatial Capture - Splat Viewer</title>
<!--
  Self-hosted 3D Gaussian-splat viewer. Renders ./assets/scene.ply (or
  .splat/.spz/.sog/.ksplat) with orbit controls + a 2-point measurement overlay.

  Built on Spark (sparkjs.dev, MIT). Chosen because it needs NO COOP/COEP
  response headers (its sort worker uses transferable ArrayBuffers, not
  SharedArrayBuffer), so it runs on plain GitHub Pages, and it's a real three.js
  scene -- so understanding-branch labels and the measurement overlay are just
  more objects in the same scene graph.

  Query params:  ?src=./assets/other.spz   ?flip=z   (or x)
  Runtime deps load from CDN via the importmap below (GitHub Pages allows CDNs).
  For a permanent portfolio link, vendor three + spark into ./vendor/ and
  repoint the importmap -- that drops the runtime third-party dependency.
-->
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #0b0d10; overflow: hidden;
    font: 13px/1.4 system-ui, sans-serif; color: #e6edf3; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #hud { position: fixed; top: 10px; left: 10px; display: flex; gap: 6px; z-index: 5; }
  #hud button { background: #161b22cc; color: #e6edf3; border: 1px solid #30363d;
    border-radius: 8px; padding: 7px 11px; font: inherit; cursor: pointer; backdrop-filter: blur(6px); }
  #hud button.active { background: #1f6feb; border-color: #1f6feb; }
  #status { position: fixed; inset: 0; display: grid; place-items: center;
    pointer-events: none; z-index: 4; text-align: center; padding: 20px; white-space: pre-line; }
  #status.err { color: #ff7b72; }
  #labels { position: fixed; inset: 0; pointer-events: none; z-index: 3; }
  .label { position: absolute; transform: translate(-50%, -140%);
    background: #0b0d10cc; border: 1px solid #1f6feb; border-radius: 6px;
    padding: 3px 7px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  #hint { position: fixed; bottom: 10px; left: 10px; opacity: .6; z-index: 5; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <button id="btnReset">Reframe</button>
  <button id="btnFlip">Flip</button>
  <button id="btnMeasure">Measure</button>
</div>
<div id="status">Loading...</div>
<div id="labels"></div>
<div id="hint">drag = orbit / scroll or pinch = zoom / right-drag = pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

const params = new URLSearchParams(location.search);
const SRC = params.get("src") || "./assets/scene.ply"; // .ply/.splat/.spz/.sog/.ksplat
const statusEl = document.getElementById("status");
const labelsEl = document.getElementById("labels");

// ---- renderer / scene / camera ----
const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap DPR for mobile perf
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d10);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
camera.position.set(0, 0, 4);

const spark = new SparkRenderer({ renderer }); // no SharedArrayBuffer -> no COOP/COEP needed
scene.add(spark);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// ---- load the splat ----
let sceneRadius = 1;
const splat = new SplatMesh({
  url: SRC,
  onLoad: () => {
    statusEl.style.display = "none";   // .hidden is overridden by #status{display:grid}
    frameToObject(splat);
    console.info("[spatial-capture] splat loaded:", SRC);
  }
});
scene.add(splat);
splat.initialized?.catch(err => {
  statusEl.style.display = "grid";
  statusEl.className = "err";
  statusEl.textContent = "Failed to load " + SRC + "\n" + err;
  console.error("[spatial-capture] load failed:", err);
});

// 3DGS .ply often loads upside down; ?flip=x|z or the Flip button fixes it.
let flipState = params.get("flip") || "none";
applyFlip();
function applyFlip() {
  splat.rotation.set(0, 0, 0);
  if (flipState === "x") splat.rotation.x = Math.PI;
  else if (flipState === "z") splat.rotation.z = Math.PI;
}

function frameToObject(mesh) {
  // getBoundingBox is LOCAL space; transform to world so Flip (a 180 rotation)
  // still frames and orbits correctly.
  mesh.updateMatrixWorld(true);
  const box = mesh.getBoundingBox(true).applyMatrix4(mesh.matrixWorld);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  sceneRadius = Math.max(size.x, size.y, size.z) * 0.5 || 1;
  controls.target.copy(center);
  const dist = sceneRadius / Math.tan((camera.fov * Math.PI / 180) / 2) * 1.5;
  camera.position.copy(center).add(new THREE.Vector3(0, 0, dist));
  camera.near = Math.max(dist / 100, 1e-3);
  camera.far = dist * 100;
  camera.updateProjectionMatrix();
  controls.update();
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- 2-point measurement overlay (toggle with Measure) ----
// Splats have no polygonal surface to raycast, so we pick against a plane
// through the orbit target facing the camera. Distances are in SCENE UNITS --
// calibrate against one known real dimension to convert to meters (see README).
let measureMode = false;
const markers = [];
let measureLine = null;
const measureLabel = document.createElement("div");
measureLabel.className = "label";
measureLabel.style.display = "none";
labelsEl.appendChild(measureLabel);

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const pickPlane = new THREE.Plane();
let downX = 0, downY = 0;

canvas.addEventListener("pointerdown", e => { downX = e.clientX; downY = e.clientY; });
canvas.addEventListener("pointerup", e => {
  if (!measureMode || !e.isPrimary) return;               // ignore secondary pinch fingers
  if (e.pointerType === "mouse" && e.button !== 0) return; // ignore right/middle click
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 10) return; // that was an orbit drag
  pointer.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointer, camera);
  const n = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  pickPlane.setFromNormalAndCoplanarPoint(n, controls.target);
  const hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(pickPlane, hit)) addMarker(hit);
});

function addMarker(p) {
  if (markers.length >= 2) clearMeasure();
  const r = sceneRadius * 0.012;
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x38bdf8 })
  );
  m.position.copy(p);
  scene.add(m); markers.push(m);
  if (markers.length === 2) {
    const g = new THREE.BufferGeometry().setFromPoints([markers[0].position, markers[1].position]);
    measureLine = new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x38bdf8 }));
    scene.add(measureLine);
  }
}
function clearMeasure() {
  markers.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  markers.length = 0;
  if (measureLine) { scene.remove(measureLine); measureLine.geometry.dispose(); measureLine.material.dispose(); measureLine = null; }
  measureLabel.style.display = "none";
}
function updateLabel() {
  if (markers.length < 2) { measureLabel.style.display = "none"; return; }
  const a = markers[0].position, b = markers[1].position;
  const mid = a.clone().add(b).multiplyScalar(0.5).project(camera);
  if (mid.z > 1) { measureLabel.style.display = "none"; return; }
  measureLabel.style.display = "block";
  measureLabel.style.left = ((mid.x * 0.5 + 0.5) * innerWidth) + "px";
  measureLabel.style.top = ((-mid.y * 0.5 + 0.5) * innerHeight) + "px";
  measureLabel.textContent = a.distanceTo(b).toFixed(3) + " units";
}

// ---- HUD ----
document.getElementById("btnReset").onclick = () => frameToObject(splat);
document.getElementById("btnFlip").onclick = () => {
  flipState = flipState === "none" ? "z" : flipState === "z" ? "x" : "none";
  applyFlip();
  frameToObject(splat);
};
const btnMeasure = document.getElementById("btnMeasure");
btnMeasure.onclick = () => {
  measureMode = !measureMode;
  btnMeasure.classList.toggle("active", measureMode);
  if (!measureMode) clearMeasure();
};

// ---- render loop ----
renderer.setAnimationLoop(() => {
  controls.update();
  renderer.render(scene, camera);
  updateLabel();
});
</script>
</body>
</html>
